name: 이슈 관리 에이전트 v11

on:
  schedule:
    - cron: "0 * * * *"   # 매시간 (KST +9h)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (실제 변경 없이 테스트)"
        required: false
        default: "false"
        type: boolean
      similarity_threshold:
        description: "중복 탐지 유사도 임계값 (0.0~1.0)"
        required: false
        default: "0.40"
      stale_days:
        description: "Stale 이슈 기준 (일)"
        required: false
        default: "30"
      notify_interval_hours:
        description: "이슈 알림 최소 간격 (시간)"
        required: false
        default: "24"

permissions:
  issues: write
  contents: read

jobs:
  manage-issues:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: git fetch & pull
        run: |
          git fetch --prune origin
          git pull origin main || git pull origin master || echo "pull skipped (both branches tried)"

      - name: Run Issue Management Agent v11
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: minwooking
          REPO_NAME: knowledgebuilder
          REPO_PATH: ${{ github.workspace }}
          BASE_BRANCH: main
          SIMILARITY_THRESHOLD: ${{ github.event.inputs.similarity_threshold || '0.40' }}
          STALE_DAYS: ${{ github.event.inputs.stale_days || '30' }}
          NOTIFY_INTERVAL_HOURS: ${{ github.event.inputs.notify_interval_hours || '24' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python3 agents/run_agent.py
